<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Analysis Results</h1>

    <h2>Detected Task</h2>
    <p>{{ task }}</p>

    <h2>Results</h2>

    {% for key, value in results.items() %}
        <p><strong>{{ key }}</strong> : {{ value }}</p>
    {% endfor %}

    <h2>LLM Explanation</h2>

    <div class="summary-box">
        {{ summary }}
    </div>

</div>

</body>
</html>
